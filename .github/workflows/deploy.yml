name: Deploy to Netlify

# Deploys the static CRM to Netlify on every push to main. Runs on GitHub's
# infrastructure (which can reach Netlify), so no local upload is needed.
#
# One-time setup: add a repository secret named NETLIFY_AUTH_TOKEN
#   GitHub -> repo Settings -> Secrets and variables -> Actions -> New secret
#   Value: a Netlify personal access token
#     (Netlify -> User settings -> Applications -> Personal access tokens -> New)
# The target site id is public and hard-coded below.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_SITE_ID: 6bcf0fc6-6a6b-48c3-8d58-1a1704b1123c
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify deploy secret is present
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::error::NETLIFY_AUTH_TOKEN secret is not set. Add it in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Assemble publish directory
        run: |
          mkdir -p dist/data
          cp index.html supabase-config.js supabase-app.js dist/
          cp data/*.json dist/data/

      - name: Deploy to Netlify (production)
        run: |
          npx --yes netlify-cli@17 deploy \
            --prod \
            --dir=dist \
            --site="$NETLIFY_SITE_ID" \
            --auth="$NETLIFY_AUTH_TOKEN" \
            --message "CI deploy ${GITHUB_SHA}"
